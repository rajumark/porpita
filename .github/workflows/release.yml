name: Release Build

on:
  push:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-commit:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          MSG="${{ github.event.head_commit.message }}"
          echo "commit_message=$MSG"
          if echo "$MSG" | grep -q "#go"; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          fi

  build-macos:
    needs: check-commit
    if: needs.check-commit.outputs.should_build == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build macos --release
      - run: |
          cd build/macos/Build/Products/Release && zip -r ${{ github.workspace }}/porpita-macos.zip porpita.app
      - uses: actions/upload-artifact@v4
        with:
          name: porpita-macos
          path: porpita-macos.zip

  build-linux:
    needs: check-commit
    if: needs.check-commit.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev
      - run: flutter pub get
      - run: flutter build linux --release
      - run: |
          cd build/linux/x64/release/bundle && zip -r ${{ github.workspace }}/porpita-linux.zip .
      - uses: actions/upload-artifact@v4
        with:
          name: porpita-linux
          path: porpita-linux.zip

  build-windows:
    needs: check-commit
    if: needs.check-commit.outputs.should_build == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build windows --release
      - shell: pwsh
        run: Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath porpita-windows.zip
      - uses: actions/upload-artifact@v4
        with:
          name: porpita-windows
          path: porpita-windows.zip

  create-release:
    needs: [check-commit, build-macos, build-linux, build-windows]
    if: needs.check-commit.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
      - name: List downloaded artifacts
        run: ls -la porpita-*/*
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN_FLUTTER }}
        run: |
          TAG="build-${{ github.run_number }}-${{ github.run_attempt }}"
          gh release create "$TAG" \
            porpita-macos/porpita-macos.zip \
            porpita-linux/porpita-linux.zip \
            porpita-windows/porpita-windows.zip \
            --title "Build $TAG" \
            --notes "Release triggered by commit: ${{ github.event.head_commit.message }}"
